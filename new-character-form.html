<h1>Add a New Character</h1>

<form>

    <label>Name</label><br>
    <input type="text" placeholder="Enter the character name"><br><br>

    <label>Universe</label><br>
    <input type="text" placeholder="Enter the universe"><br><br>

    <label>Role</label><br>
    <input type="text" placeholder="Enter the role"><br><br>

    <label>Image URL</label><br>
    <input type="text" placeholder="Paste the image link"><br><br>

    <label>Short Description</label><br>
    <textarea placeholder="Describe the character"></textarea><br><br>

    <button type="submit">Submit</button>

</form>
